    <script>
        (function () {
            var height = Math.round(window.innerHeight);
            document.documentElement.style.setProperty("--top-screen-height", height + "px");
            if (height <= 700) {
                document.documentElement.classList.add("compact-top");
            }
            try {
                var entry = performance.getEntriesByType("navigation")[0];
                var isReload = entry && entry.type === "reload";
                if (!isReload && sessionStorage.getItem("timeless-nav-intro-seen")) {
                    document.documentElement.classList.add("nav-intro-seen");
                }
            } catch (error) {}
        })();
    </script>
